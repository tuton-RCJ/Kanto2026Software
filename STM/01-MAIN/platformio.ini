[env:genericSTM32F446RE]
platform = ststm32
board = genericSTM32F446RE
framework = arduino
lib_deps = 
	adafruit/Adafruit NeoPixel@^1.15.2
	adafruit/Adafruit BNO055@^1.6.4
	workloads/SCServo@^1.0.1
	adafruit/Adafruit SSD1306@^2.5.15
